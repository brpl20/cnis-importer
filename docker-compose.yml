services:
  cnis-parser:
    build: .
    container_name: cnis_parser
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - CNIS_API_KEY=${CNIS_API_KEY:-changeme}
      - CNIS_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
